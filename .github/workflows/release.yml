name: Release

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build llvm clang sqlite3 libsqlite3-dev libgc-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Create swap (Stage 2 needs ~15GB, runner has 7GB RAM)
        run: |
          sudo swapoff /swapfile 2>/dev/null || true
          sudo rm -f /swapfile
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

      - name: Stamp version into glyph.glyph
        run: |
          VERSION=${{ github.ref_name }}
          sqlite3 glyph.glyph <<EOF
          UPDATE def SET body='glyph_version u = "$VERSION"', compiled=0
          WHERE name='glyph_version' AND kind='fn';
          EOF

      - name: "Stage 0: Build glyph0 (Rust bootstrap compiler)"
        run: cargo build --release && cp target/release/glyph glyph0

      - name: "Stage 1: glyph0 compiles glyph.glyph → glyph1 (Cranelift)"
        run: ./glyph0 build glyph.glyph --full && mv glyph glyph1

      - name: "Stage 2: glyph1 self-builds → glyph2 (C codegen)"
        run: ./glyph1 build glyph.glyph glyph2

      - name: "Stage 3: glyph2 re-builds → glyph (LLVM codegen)"
        run: ./glyph2 build glyph.glyph glyph --emit=llvm

      - name: Test compiler
        run: |
          ./glyph test glyph.glyph
          ./glyph test documentation.glyph

      - name: Test libraries
        run: |
          # Libraries needing headers not available in CI
          SKIP="x11.glyph gtk.glyph"
          for lib in libraries/*.glyph; do
            base=$(basename "$lib")
            if echo "$SKIP" | grep -qw "$base"; then
              echo "Skipping $lib (needs native headers)"
              continue
            fi
            count=$(sqlite3 "$lib" "SELECT COUNT(*) FROM def WHERE kind='test'")
            if [ "$count" -gt 0 ]; then
              echo "Testing $lib ($count tests)"
              ./glyph test "$lib"
            else
              echo "Skipping $lib (no tests)"
            fi
          done

      - name: Package
        run: |
          mkdir -p dist/skills dist/libraries
          cp glyph dist/
          cp documentation.glyph dist/
          cp .claude/skills/glyph/* dist/skills/
          cp libraries/* dist/libraries/
          tar -czf dist/glyph-linux-x86_64.tar.gz -C dist glyph documentation.glyph skills/ libraries/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/glyph-linux-x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
