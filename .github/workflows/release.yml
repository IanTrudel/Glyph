name: Release

on:
  push:
    tags: ['v*']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build llvm clang sqlite3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Stamp version into glyph.glyph
        run: |
          VERSION=${{ github.ref_name }}
          sqlite3 glyph.glyph <<EOF
          UPDATE def SET body='glyph_version u = "$VERSION"', compiled=0
          WHERE name='glyph_version' AND kind='fn';
          EOF

      - name: Build (full bootstrap)
        run: ninja bootstrap

      - name: Test
        run: ./glyph test glyph.glyph

      - name: Package
        run: |
          mkdir -p dist/skills
          cp glyph dist/
          cp .claude/skills/glyph/* dist/skills/
          tar -czf dist/glyph-linux-x86_64.tar.gz -C dist glyph skills/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/glyph-linux-x86_64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
